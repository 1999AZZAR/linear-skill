interface:
  display_name: "Linear"
  short_description: "Manage Linear issues, projects, and cycles"
  icon_small: "./assets/linear-small.svg"
  icon_large: "./assets/linear.png"
  default_prompt: "Use $linear to inspect or update the relevant Linear issues, projects, or cycle work, then report concrete next actions."

dependencies:
  tools:
    - type: "mcp"
      value: "linear"
      description: "Linear MCP server"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"

policy:
  allow_implicit_invocation: true
